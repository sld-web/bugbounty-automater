syntax = "proto3";

package bugbounty;

service CredentialService {
    rpc GetCredential(GetCredentialRequest) returns (GetCredentialResponse);
    rpc ValidateCredential(ValidateCredentialRequest) returns (ValidateCredentialResponse);
    rpc RefreshCredential(RefreshCredentialRequest) returns (RefreshCredentialResponse);
    rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

message GetCredentialRequest {
    string credential_id = 1;
    string target_id = 2;
    string purpose = 3;
}

message GetCredentialResponse {
    bool success = 1;
    string error = 2;
    Credential credential = 3;
    int64 expires_at = 4;
}

message Credential {
    string id = 1;
    string type = 2;  // user_pass, api_key, session_token, certificate, totp
    string username = 3;
    string password = 4;
    string api_key = 5;
    string token = 6;
    map<string, string> metadata = 7;
}

message ValidateCredentialRequest {
    string credential_id = 1;
}

message ValidateCredentialResponse {
    bool valid = 1;
    string error = 2;
    int64 expires_at = 3;
}

message RefreshCredentialRequest {
    string credential_id = 1;
}

message RefreshCredentialResponse {
    bool success = 1;
    string error = 2;
    int64 new_expires_at = 3;
}

message HealthCheckRequest {}

message HealthCheckResponse {
    bool healthy = 1;
    string version = 2;
}
