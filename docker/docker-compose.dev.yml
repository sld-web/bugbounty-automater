version: "3.8"

services:
  backend:
    environment:
      DEBUG: "true"
    volumes:
      - ../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug

  frontend:
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
