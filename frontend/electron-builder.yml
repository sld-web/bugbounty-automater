appId: com.bugbounty.automator
productName: BugBounty Automator
directories:
  buildResources: build
  output: release
files:
  - dist
  - dist-electron
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-Setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}.${ext}
linux:
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: ${productName}-${version}.${ext}
publish:
  provider: generic
  url: https://example.com/updates
